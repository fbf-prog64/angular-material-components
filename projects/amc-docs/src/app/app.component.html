<mat-toolbar color="primary" class="flex-row">
  <button mat-button class="app-menu-button" (click)="sidenav.toggle()">
    <i class="material-icons">menu</i>
  </button>
  <span class="title">{{ nameApp }}</span>

  @if (!isHandset) {
    <a mat-button class="img-btn" href="https://github.com/fbf-prog64/angular-material-components">
      <img src="./GitHub-Mark-Light-32px.png" />
    </a>
  }
</mat-toolbar>

<mat-sidenav-container class="sidenav container">
  <mat-sidenav
    #sidenav
    [mode]="sidenavMode"
    [opened]="sidenavOpened"
    [disableClose]="!isHandset"
    [fixedInViewport]="false"
    [fixedBottomGap]="0"
  >
    <mat-nav-list class="left">
      <a mat-list-item routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="item">
        <div class="content flex-row">
          <mat-icon>home</mat-icon>
          <span>Home</span>
        </div>
      </a>
      <a mat-list-item routerLink="/datetimepicker" routerLinkActive="active" class="item">
        <div class="content flex-row">
          <mat-icon>date_range</mat-icon>
          <span>Datetime picker</span>
        </div>
      </a>
      <a mat-list-item routerLink="/datetimepicker-v2" routerLinkActive="active" class="item">
        <div class="content flex-row">
          <mat-icon>schedule</mat-icon>
          <span>Datetime picker V2</span>
        </div>
      </a>
      <a mat-list-item routerLink="/timepicker" routerLinkActive="active" class="item">
        <div class="content flex-row">
          <mat-icon>access_time</mat-icon>
          <span>Time picker</span>
        </div>
      </a>
      <a mat-list-item routerLink="/colorpicker" routerLinkActive="active" class="item">
        <div class="content flex-row">
          <mat-icon>colorize</mat-icon>
          <span>Color picker</span>
        </div>
      </a>
      <a mat-list-item routerLink="/fileinput" routerLinkActive="active" class="item">
        <div class="content flex-row">
          <mat-icon>attach_file</mat-icon>
          <span>File input</span>
        </div>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main content -->
  <mat-sidenav-content>
    <div class="app-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
